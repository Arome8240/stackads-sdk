name: Verify Published Packages

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install published packages (100x)
        run: |
          for i in $(seq 1 100); do
            echo "Run $i/100"
            npm install @stackads/core @stackads/react @stackads/react-native
          done
